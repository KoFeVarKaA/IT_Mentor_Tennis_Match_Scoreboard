<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Scoreboard | Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>
<body>
<header class="header">
    <section class="nav-header">
        <div class="brand">
            <div class="nav-toggle">
                <img src="images/menu.png" alt="Логотип" class="logo">
            </div>
            <span class="logo-text">TennisScoreboard</span>
        </div>
        <div>
            <nav class="nav-links">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link" href="/matches">Матчи</a>
            </nav>
        </div>
    </section>
</header>
<main>
    <div class="container">
        <h1>Добро пожаловать в Tennis Scoreboard</h1>
        <p>Управляйте теннисными матчами, записывайте результаты и отслеживайте рейтинги</p>
        <!-- <div class="welcome-image"></div> -->
        <div class="form-container center">
            <a class="homepage-action-button" href="/matches/new">
                <button class="btn start-match">
                    Начать новый матч
                </button>
            </a>
            <a class="homepage-action-button" href="#">
                <button class="btn view-results">
                    Посмотреть результаты
                </button>
            </a>
        </div>
    </div>
</main>

    </div>
</footer> -->
</body>
</html>

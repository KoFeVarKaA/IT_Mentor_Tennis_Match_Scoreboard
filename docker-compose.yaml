networks:
  dev:
services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - '/etc/letsencrypt:/etc/letsencrypt'
    depends_on:
      - backfrontend
    networks:
      - dev

  backfrontend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    networks:
      - dev

  postgres:
    image: postgres:13.3
    environment:
      POSTGRES_DB: "main"
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "password"
    ports:
      - "5432:5432"
    networks:
      - dev